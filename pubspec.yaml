name: immospace
description: ImmoSpace mobile application with VR and AR features.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  panorama_viewer: ^2.0.7
  ar_flutter_plugin:
    path: packages/ar_flutter_plugin
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  go_router: ^13.0.0
  path_provider: ^2.1.1
  http: ^1.1.0
  get_it: ^7.6.4
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
